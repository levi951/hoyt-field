<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0A0A0A">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Hoyt Field">
<title>Hoyt Field</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Montserrat:wght@700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0A0A0A;--s1:#111111;--s2:#1A1A1A;--s3:#222222;
  --red:#C41E3A;--red-dim:#8B1528;--red-glow:rgba(196,30,58,0.3);
  --white:#FFFFFF;--g1:#B8B8B8;--g2:#888888;--g3:#555555;
  --border:#2A2A2A;--green:#22C55E;--err:#EF4444;
  --hdr:48px;--nav:60px;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--white);font-family:'Inter',sans-serif;font-size:15px}
button{background:none;border:none;cursor:pointer;color:inherit;font-family:inherit}
input,textarea,select{font-family:'Inter',sans-serif;font-size:14px;background:var(--s3);color:var(--white);border:1px solid var(--border);border-radius:12px;outline:none;padding:10px 14px}
input::placeholder,textarea::placeholder{color:var(--g3)}
input:focus,textarea:focus,select:focus{border-color:var(--g2)}
select option{background:var(--s2)}
textarea{resize:none;line-height:1.4}
svg{display:block;flex-shrink:0}

/* ── Layout ── */
#app{display:flex;flex-direction:column;height:100%;height:100dvh;overflow:hidden}
#hdr{height:var(--hdr);min-height:var(--hdr);background:var(--s1);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 12px;z-index:10;gap:8px}
.hdr-left{display:flex;align-items:center;gap:8px;min-width:0}
.hf-logo{width:28px;height:28px;background:var(--red);border-radius:7px;display:flex;align-items:center;justify-content:center;font-family:'Montserrat',sans-serif;font-weight:800;font-size:11px;color:var(--white);flex-shrink:0}
.hf-brand{font-family:'Montserrat',sans-serif;font-weight:800;font-size:15px;color:var(--white);white-space:nowrap}
.hdr-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.status-dot{width:9px;height:9px;border-radius:50%;background:var(--g3);transition:background .3s;flex-shrink:0}
.status-dot.connected{background:var(--green)}
.status-dot.error{background:var(--err)}
.icon-btn{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:var(--s2);border:1px solid var(--border);color:var(--g1);transition:background .2s,color .2s;flex-shrink:0}
.icon-btn:active{background:var(--s3)}
.bot-pill{display:flex;align-items:center;gap:4px;padding:5px 10px;background:var(--s2);border:1px solid var(--border);border-radius:20px;font-size:12px;font-weight:700;color:var(--g1);transition:background .2s;white-space:nowrap;flex-shrink:0}
.bot-pill:active{background:var(--s3)}

/* ── Context Strip ── */
#ctx-strip{display:flex;gap:6px;padding:8px 12px;background:var(--s1);border-bottom:1px solid var(--border);overflow-x:auto;-webkit-overflow-scrolling:touch}
#ctx-strip::-webkit-scrollbar{display:none}
.ctx-chip{display:flex;align-items:center;gap:5px;padding:6px 11px;border-radius:20px;font-size:12px;font-weight:600;border:1px solid var(--border);background:var(--s2);color:var(--g2);transition:all .15s;white-space:nowrap;flex-shrink:0}
.ctx-chip.on{background:rgba(196,30,58,.12);border-color:var(--red-dim);color:var(--red)}
.ctx-chip-dot{width:6px;height:6px;border-radius:50%;background:var(--g3);flex-shrink:0;transition:background .15s}
.ctx-chip.on .ctx-chip-dot{background:var(--red)}

/* ── Tabs ── */
#content{flex:1;overflow:hidden;position:relative}
.tab{position:absolute;inset:0;overflow-y:auto;overflow-x:hidden;opacity:0;transform:translateY(8px);pointer-events:none;transition:opacity .25s ease,transform .25s ease}
.tab.active{opacity:1;transform:translateY(0);pointer-events:all}
#bottom-nav{height:var(--nav);min-height:var(--nav);padding-bottom:env(safe-area-inset-bottom);background:var(--s1);border-top:1px solid var(--border);display:flex;align-items:stretch;z-index:10}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;color:var(--g3);font-size:9px;font-weight:600;position:relative;transition:color .2s;padding-top:4px}
.nav-btn::before{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:20px;height:2px;background:var(--red);border-radius:1px;opacity:0;transition:opacity .2s}
.nav-btn.active{color:var(--red)}
.nav-btn.active::before{opacity:1}
.nav-btn svg{width:19px;height:19px}

/* ── Voice Tab ── */
#tab-voice{display:flex;flex-direction:column;align-items:center;padding:20px 24px;gap:16px;justify-content:center}
.orb-wrap{position:relative;width:180px;height:180px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.orb-ring{position:absolute;border-radius:50%;border:1.5px solid var(--red-glow);opacity:0;transition:opacity .3s}
.orb-ring.r1{width:140px;height:140px}
.orb-ring.r2{width:160px;height:160px}
.orb-ring.r3{width:180px;height:180px}
.voice-active .orb-ring{animation:ripple 1.6s ease-out infinite}
.voice-active .orb-ring.r1{animation-delay:0s}
.voice-active .orb-ring.r2{animation-delay:.4s}
.voice-active .orb-ring.r3{animation-delay:.8s}
@keyframes ripple{0%{transform:scale(.85);opacity:.6}100%{transform:scale(1.15);opacity:0}}
.orb-core{width:100px;height:100px;border-radius:50%;background:radial-gradient(circle at 35% 35%,var(--s2),var(--bg));border:2px solid var(--border);display:flex;align-items:center;justify-content:center;transition:border-color .3s,box-shadow .3s;position:relative;z-index:1}
.voice-active .orb-core{border-color:var(--red);box-shadow:0 0 24px var(--red-glow),0 0 8px var(--red-glow)}
.orb-core svg{width:36px;height:36px;color:var(--g2);transition:color .3s}
.voice-active .orb-core svg{color:var(--red)}
.waveform{display:flex;align-items:flex-end;gap:3px;height:28px}
.wv-bar{width:3px;background:var(--red);border-radius:2px;height:4px}
.voice-active .wv-bar{animation:wave 1s ease-in-out infinite}
.wv-bar:nth-child(1){animation-delay:0s;--peak:8px}.wv-bar:nth-child(2){animation-delay:.07s;--peak:14px}
.wv-bar:nth-child(3){animation-delay:.14s;--peak:20px}.wv-bar:nth-child(4){animation-delay:.21s;--peak:26px}
.wv-bar:nth-child(5){animation-delay:.28s;--peak:22px}.wv-bar:nth-child(6){animation-delay:.35s;--peak:28px}
.wv-bar:nth-child(7){animation-delay:.42s;--peak:28px}.wv-bar:nth-child(8){animation-delay:.49s;--peak:22px}
.wv-bar:nth-child(9){animation-delay:.56s;--peak:26px}.wv-bar:nth-child(10){animation-delay:.63s;--peak:18px}
.wv-bar:nth-child(11){animation-delay:.70s;--peak:12px}.wv-bar:nth-child(12){animation-delay:.77s;--peak:8px}
@keyframes wave{0%,100%{height:4px}50%{height:var(--peak,16px)}}
.voice-status{font-size:12px;font-weight:700;letter-spacing:.12em;color:var(--g2);text-transform:uppercase}
.voice-transcript{font-size:14px;font-style:italic;color:var(--g2);text-align:center;min-height:20px;padding:0 8px}
.response-card{width:100%;background:var(--s1);border:1px solid var(--border);border-radius:16px;padding:16px;font-size:14px;line-height:1.6;color:var(--g1);min-height:72px;max-height:180px;overflow-y:auto}
.placeholder-text{color:var(--g3);font-style:italic}
.voice-controls{display:flex;align-items:center;justify-content:center;gap:16px;width:100%}
.pill-btn{display:flex;align-items:center;gap:6px;padding:10px 16px;background:var(--s2);border:1px solid var(--border);border-radius:24px;font-size:13px;font-weight:600;color:var(--g1);transition:background .2s,color .2s,border-color .2s;white-space:nowrap}
.pill-btn:active,.pill-btn.active{background:rgba(196,30,58,.15);border-color:var(--red-dim);color:var(--red)}
.ptt-btn{width:80px;height:80px;border-radius:50%;background:var(--red);display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px var(--red-glow);transition:transform .1s,box-shadow .1s;flex-shrink:0}
.ptt-btn:active,.ptt-btn.pressed{transform:scale(.92);box-shadow:0 2px 10px var(--red-glow)}

/* ── Chat Tab ── */
#tab-chat{display:flex;flex-direction:column;padding:0;overflow:hidden}
#chat-messages{flex:1;overflow-y:auto;padding:12px 14px;display:flex;flex-direction:column;gap:10px}
.msg{display:flex;gap:8px;animation:msgIn .25s ease forwards}
.msg.user{flex-direction:row-reverse}
@keyframes msgIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.msg-avatar{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0;align-self:flex-end}
.msg.user .msg-avatar{background:var(--red);color:var(--white)}
.msg.wray .msg-avatar{background:var(--s2);border:1px solid var(--border);color:var(--g1)}
.msg-bubble{max-width:75%;padding:10px 13px;border-radius:16px;font-size:14px;line-height:1.5;word-break:break-word}
.msg.user .msg-bubble{background:var(--red);color:var(--white);border-bottom-right-radius:4px}
.msg.wray .msg-bubble{background:var(--s2);border:1px solid var(--border);color:var(--g1);border-bottom-left-radius:4px}
.msg-img{max-width:200px;border-radius:10px;margin-bottom:6px;display:block}
.typing-dots{display:flex;gap:4px;padding:4px 2px}
.typing-dot{width:6px;height:6px;border-radius:50%;background:var(--g2);animation:typingDot .9s ease-in-out infinite}
.typing-dot:nth-child(2){animation-delay:.2s}.typing-dot:nth-child(3){animation-delay:.4s}
@keyframes typingDot{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-6px);opacity:1}}
.chat-input-bar{display:flex;align-items:flex-end;gap:6px;padding:10px 12px;background:var(--s1);border-top:1px solid var(--border);padding-bottom:max(10px,env(safe-area-inset-bottom))}
.chat-input-bar textarea{flex:1;max-height:100px;min-height:38px;border-radius:20px;padding:9px 14px;font-size:14px;line-height:1.4}
.chat-mic-btn.recording{background:rgba(196,30,58,.2)!important;border-color:var(--red)!important;color:var(--red)!important}
.send-btn{background:var(--red)!important;color:var(--white)!important;border-color:var(--red)!important}

/* ── Camera Tab ── */
#tab-camera{display:flex;flex-direction:column;padding:0;overflow:hidden}
.camera-wrap{position:relative;flex:1;background:#000;overflow:hidden;min-height:0}
#camera-video{width:100%;height:100%;object-fit:cover;display:block}
#capture-overlay{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.cam-overlay-bottom{position:absolute;bottom:0;left:0;right:0;padding:16px 20px 20px;background:linear-gradient(transparent,rgba(0,0,0,.7));display:flex;align-items:center;justify-content:space-between}
.cam-action-row{position:absolute;bottom:90px;left:0;right:0;display:flex;justify-content:center;gap:12px}
.cam-btn{display:flex;flex-direction:column;align-items:center;gap:3px;background:rgba(255,255,255,.15);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.2);border-radius:50%;width:52px;height:52px;justify-content:center;font-size:10px;font-weight:600;color:var(--white);transition:background .2s}
.cam-btn:active{background:rgba(255,255,255,.25)}
.cam-btn-wide{border-radius:20px;padding:0 16px;width:auto;gap:6px;flex-direction:row}
.shutter-btn{width:72px;height:72px;border-radius:50%;background:rgba(255,255,255,.9);border:3px solid rgba(255,255,255,.5);display:flex;align-items:center;justify-content:center;transition:transform .1s;flex-shrink:0}
.shutter-btn::after{content:'';width:58px;height:58px;border-radius:50%;background:var(--white);display:block}
.shutter-btn:active{transform:scale(.92)}
.hidden{display:none!important}
#analysis-panel{background:var(--s1);border-top:1px solid var(--border);padding:12px 16px;font-size:13px;line-height:1.6;color:var(--g1);max-height:140px;overflow-y:auto}
.cam-no-camera{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:12px;color:var(--g2);font-size:14px;padding:24px;text-align:center}

/* ── Briefs Tab ── */
#tab-briefs{display:flex;flex-direction:column;padding:0;overflow:hidden;position:relative}
.briefs-hdr{display:flex;align-items:center;padding:12px 16px;border-bottom:1px solid var(--border);gap:10px}
.briefs-title{font-weight:800;font-size:16px;flex:1}
#briefs-list{flex:1;overflow-y:auto;padding:8px 12px;display:flex;flex-direction:column;gap:6px}
.brief-item{display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--s1);border:1px solid var(--border);border-radius:12px;cursor:pointer;transition:background .15s}
.brief-item:active{background:var(--s2)}
.brief-date{font-size:11px;font-weight:700;color:var(--red);background:rgba(196,30,58,.1);border:1px solid var(--red-dim);border-radius:6px;padding:3px 7px;white-space:nowrap;flex-shrink:0}
.brief-name{font-size:13px;font-weight:600;color:var(--white);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.briefs-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 24px;gap:10px;color:var(--g2);font-size:13px;text-align:center}
#brief-viewer{position:absolute;inset:0;background:var(--bg);display:flex;flex-direction:column;z-index:5}
.brief-viewer-hdr{display:flex;align-items:center;padding:10px 14px;border-bottom:1px solid var(--border);gap:10px}
.brief-viewer-title{font-size:14px;font-weight:700;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
#brief-content{flex:1;overflow-y:auto;padding:16px;font-size:13px;line-height:1.7;color:var(--g1)}

/* ── Videos Tab ── */
#tab-videos{display:flex;flex-direction:column;padding:0;overflow:hidden}
#video-player{width:100%;aspect-ratio:16/9;background:#000;flex-shrink:0;display:block}
.video-url-bar{display:flex;gap:8px;padding:10px 12px;background:var(--s1);border-bottom:1px solid var(--border)}
.video-url-bar input{flex:1;border-radius:10px;font-size:13px}
.red-btn{background:var(--red);color:var(--white);border:none;border-radius:10px;padding:0 16px;font-weight:700;font-size:13px;flex-shrink:0;min-height:38px;transition:background .2s}
.red-btn:active{background:var(--red-dim)}
#video-list{flex:1;overflow-y:auto;padding:8px 12px;display:flex;flex-direction:column;gap:6px}
.video-item{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--s1);border:1px solid var(--border);border-radius:12px;cursor:pointer;transition:background .15s}
.video-item:active{background:var(--s2)}
.video-thumb{width:56px;height:40px;background:var(--s2);border-radius:6px;display:flex;align-items:center;justify-content:center;color:var(--g2);flex-shrink:0}
.video-info{flex:1;min-width:0}
.video-name{font-size:13px;font-weight:600;color:var(--white);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.video-meta{font-size:11px;color:var(--g2);margin-top:2px}
.video-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;gap:10px;color:var(--g2);font-size:13px;text-align:center}

/* ── Tasks Tab ── */
#tab-tasks{display:flex;flex-direction:column;padding:0;overflow:hidden}
.tasks-hdr{display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:1px solid var(--border)}
.tasks-title{font-weight:800;font-size:16px;flex:1}
.progress-wrap{width:80px;height:6px;background:var(--s2);border-radius:3px;overflow:hidden}
#progress-bar{height:100%;background:var(--red);border-radius:3px;transition:width .3s ease}
#task-counter{font-size:12px;color:var(--g2);font-weight:600;white-space:nowrap}
.tasks-actions{display:flex;gap:8px;padding:10px 16px;border-bottom:1px solid var(--border)}
.tasks-actions .pill-btn{font-size:12px;padding:8px 14px}
.add-task-bar{display:flex;gap:8px;padding:10px 12px;border-bottom:1px solid var(--border)}
.add-task-bar input{flex:1;border-radius:10px}
#task-list{flex:1;overflow-y:auto;padding:8px 12px;display:flex;flex-direction:column;gap:4px}
.task-item{display:flex;align-items:center;gap:10px;padding:12px;background:var(--s1);border:1px solid var(--border);border-radius:10px}
.task-cb{width:22px;height:22px;border-radius:6px;border:2px solid var(--border);background:transparent;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .15s,border-color .15s;flex-shrink:0}
.task-cb.done{background:var(--red);border-color:var(--red)}
.task-check{display:none;color:var(--white);font-size:13px;font-weight:700;line-height:1}
.task-cb.done .task-check{display:block}
.task-text{flex:1;font-size:14px;line-height:1.3;transition:color .2s}
.task-text.done{color:var(--g3);text-decoration:line-through}
.task-del{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--g3);font-size:18px;transition:background .15s,color .15s}
.task-del:active{background:rgba(239,68,68,.2);color:var(--err)}
.task-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;gap:8px;color:var(--g2);font-size:13px}

/* ── Bot + Settings Sheets ── */
#bot-list{display:flex;flex-direction:column;gap:6px}
.bot-option{display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--s2);border:1px solid var(--border);border-radius:12px;text-align:left;color:var(--g1);transition:background .15s,border-color .15s;width:100%}
.bot-option:active{background:var(--s3)}
.bot-option.active-bot{border-color:var(--red);background:rgba(196,30,58,.08)}
.bot-dot{width:10px;height:10px;border-radius:50%;border:2px solid var(--g3);flex-shrink:0;transition:all .15s}
.bot-option.active-bot .bot-dot{background:var(--red);border-color:var(--red)}
.bot-info{flex:1}
.bot-name{font-size:14px;font-weight:700;color:var(--white)}
.bot-option.active-bot .bot-name{color:var(--red)}
.bot-desc{font-size:11px;color:var(--g2);margin-top:2px}
.settings-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);z-index:100;opacity:0;transition:opacity .25s ease}
.settings-backdrop.visible{opacity:1}
.settings-sheet{position:fixed;bottom:0;left:0;right:0;z-index:101;background:var(--s1);border-top:1px solid var(--border);border-radius:20px 20px 0 0;padding:16px 16px max(20px,env(safe-area-inset-bottom)) 16px;transform:translateY(100%);transition:transform .3s ease;max-height:88vh;overflow-y:auto}
.settings-sheet.visible{transform:translateY(0)}
.settings-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 16px}
.settings-title{font-family:'Montserrat',sans-serif;font-weight:800;font-size:16px;margin-bottom:14px}
.settings-section{font-size:11px;font-weight:700;color:var(--red);text-transform:uppercase;letter-spacing:.08em;margin:16px 0 8px;border-top:1px solid var(--border);padding-top:12px}
.settings-field{margin-bottom:12px}
.settings-label{font-size:12px;font-weight:600;color:var(--g2);margin-bottom:5px;display:block;text-transform:uppercase;letter-spacing:.06em}
.settings-field input,.settings-field select,.settings-field textarea{width:100%;font-size:13px}
.settings-field textarea{min-height:72px;border-radius:10px}
.settings-toggle-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.settings-toggle-label{font-size:14px;font-weight:500;color:var(--g1)}
.toggle{width:44px;height:26px;border-radius:13px;background:var(--border);position:relative;cursor:pointer;transition:background .2s;flex-shrink:0}
.toggle.on{background:var(--red)}
.toggle::after{content:'';position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:50%;background:var(--white);transition:transform .2s;box-shadow:0 1px 4px rgba(0,0,0,.3)}
.toggle.on::after{transform:translateX(18px)}
.settings-buttons{display:flex;flex-direction:column;gap:8px;margin-top:16px}
.btn-primary{width:100%;padding:14px;border-radius:12px;background:var(--red);color:var(--white);font-weight:700;font-size:15px;transition:background .2s}
.btn-primary:active{background:var(--red-dim)}
.btn-secondary{width:100%;padding:14px;border-radius:12px;background:var(--s2);border:1px solid var(--border);color:var(--g1);font-weight:700;font-size:15px;transition:background .2s}
.btn-secondary:active{background:var(--s3)}
#toast-container{position:fixed;bottom:calc(var(--nav) + env(safe-area-inset-bottom) + 10px);left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:6px;z-index:200;pointer-events:none}
.toast{background:var(--s2);border:1px solid var(--border);border-radius:24px;padding:10px 20px;font-size:13px;font-weight:600;color:var(--g1);white-space:nowrap;opacity:0;transform:translateY(8px);animation:toastIn .25s ease forwards}
.toast.out{animation:toastOut .25s ease forwards}
@keyframes toastIn{to{opacity:1;transform:translateY(0)}}
@keyframes toastOut{to{opacity:0;transform:translateY(4px)}}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
</style>
</head>

  else localStorage.setItem(key, on ? 'on' : 'off');

function buildSystemPrompt() {

// ─── AI API ─────────────────────────────────────
async function callAI(messages, onChunk, onDone, stream) {
  if (stream === undefined) stream = true;
  const c = cfg();
  if (!c.url) { toast('No URL set for this bot'); onDone(new Error('no url')); return; }
  const sysPrompt = buildSystemPrompt();
  const body = JSON.stringify({ model: c.model, messages: [{ role:'system', content: sysPrompt }, ...messages], stream });
  let failed = false;
  try {
    setDot('ok');
    const headers = { 'Content-Type':'application/json', 'Authorization':'Bearer ' + c.token };
    const botId = localStorage.getItem('hf_bot') || 'wray';
    if (botId === 'wray' || botId === 'work') {
      headers['x-openclaw-session-key'] = 'agent:main:field:' + c.role;
      headers['x-openclaw-message-channel'] = 'field';
    }
    const res = await fetch(c.url + '/v1/chat/completions', { method:'POST', headers, body });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    if (!stream) {
      const j = await res.json();
      onChunk(j.choices?.[0]?.message?.content || '');
      onDone();
      return;
    }
    const reader = res.body.getReader();
    const dec = new TextDecoder();
    let buf = '';
    for (;;) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += dec.decode(value, { stream: true });
      const lines = buf.split('\n');
      buf = lines.pop();
      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const raw = line.slice(6).trim();
        if (raw === '[DONE]') { onDone(); return; }
        try { const c2 = JSON.parse(raw).choices?.[0]?.delta?.content; if (c2) onChunk(c2); } catch (_) {}
      }
    }
  } catch (e) { failed = true; setDot('err'); toast('AI error: ' + e.message); }
  onDone(failed ? new Error('failed') : null);
}

// ─── TTS ────────────────────────────────────────
let ttsVoiceEl = null, currentAudio = null;
function loadBrowserVoice() {
  const vv = speechSynthesis.getVoices();
  ttsVoiceEl = vv.find(v => v.name.toLowerCase().includes('google') && v.lang === 'en-US') || vv.find(v => v.lang === 'en-US') || null;
}
if (typeof speechSynthesis !== 'undefined') { speechSynthesis.onvoiceschanged = loadBrowserVoice; loadBrowserVoice(); }

function stripMd(t) {
  return t.replace(/```[\s\S]*?```/g,'').replace(/`([^`]+)`/g,'$1').replace(/\*\*([^*]+)\*\*/g,'$1')
    .replace(/\*([^*]+)\*/g,'$1').replace(/#+\s*/g,'').replace(/\n{2,}/g,'. ').replace(/\n/g,' ').trim();
}
function stopTTS() {
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }
  if (typeof speechSynthesis !== 'undefined') speechSynthesis.cancel();
}
async function speak(text, cb) {
  const c = cfg();
  if (!c.voice) { cb?.(); return; }
  stopTTS();
  const clean = stripMd(text);
  if (!clean) { cb?.(); return; }

  if (c.ttsEngine === 'elevenlabs' && c.ttsKey) {
    try {
      const res = await fetch('https://api.elevenlabs.io/v1/text-to-speech/' + encodeURIComponent(c.ttsVoice) + '/stream', {
        method:'POST',
        headers:{ 'xi-api-key': c.ttsKey, 'Content-Type':'application/json' },
        body: JSON.stringify({ text: clean, model_id:'eleven_turbo_v2_5', voice_settings:{ stability:0.5, similarity_boost:0.75 } }),
      });
      if (res.ok) {
        const url = URL.createObjectURL(await res.blob());
        currentAudio = new Audio(url);
        currentAudio.onended = () => { URL.revokeObjectURL(url); cb?.(); };
        currentAudio.onerror = () => { URL.revokeObjectURL(url); cb?.(); };
        currentAudio.play().catch(() => cb?.());
        return;
      }
    } catch (_) {}
    toast('ElevenLabs failed — using browser voice');
  }

  if (c.ttsEngine === 'openai' && c.ttsKey) {
    try {
      const res = await fetch('https://api.openai.com/v1/audio/speech', {
        method:'POST',
        headers:{ 'Authorization':'Bearer ' + c.ttsKey, 'Content-Type':'application/json' },
        body: JSON.stringify({ model:'tts-1-hd', voice:'onyx', input: clean }),
      });
      if (res.ok) {
        const url = URL.createObjectURL(await res.blob());
        currentAudio = new Audio(url);
        currentAudio.onended = () => { URL.revokeObjectURL(url); cb?.(); };
        currentAudio.onerror = () => { URL.revokeObjectURL(url); cb?.(); };
        currentAudio.play().catch(() => cb?.());
        return;
      }
    } catch (_) {}
    toast('OpenAI TTS failed — using browser voice');
  }

  if (typeof speechSynthesis === 'undefined') { cb?.(); return; }
  const u = new SpeechSynthesisUtterance(clean);
  u.rate = 1.05; u.pitch = 1.0;
  if (ttsVoiceEl) u.voice = ttsVoiceEl;
  u.onend = () => cb?.(); u.onerror = () => cb?.();
  speechSynthesis.speak(u);
}

const hasSR = !!(window.SpeechRecognition || window.webkitSpeechRecognition);
let recog = null;
if (hasSR) {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  recog = new SR(); recog.continuous = false; recog.interimResults = true; recog.lang = 'en-US';
}
function vStatus(t) { document.getElementById('voice-status').textContent = t; }
function vTranscript(t) { document.getElementById('voice-transcript').textContent = t; }
function setOrbActive(on) { document.getElementById('orb-wrap').classList.toggle('voice-active', on); }
function setVoiceResponse(text) { document.getElementById('voice-response').textContent = text; }
function startListen() {
  if (!hasSR) { toast('Voice not supported'); return; }
  stopTTS(); S.finalTranscript = ''; vStatus('LISTENING...'); vTranscript(''); setOrbActive(true);
  try { recog.start(); } catch (_) {}
}
function stopListen() { try { recog.stop(); } catch (_) {} }

if (recog) {
  recog.onresult = (e) => {
    let interim = '', final = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      if (e.results[i].isFinal) final += e.results[i][0].transcript;
      else interim += e.results[i][0].transcript;
    }
    if (final) S.finalTranscript = final;
    vTranscript(final || interim);
  };
  recog.onerror = (e) => {
    if (e.error !== 'no-speech' && e.error !== 'aborted') toast('Mic: ' + e.error);
    setOrbActive(false); vStatus(S.callMode ? 'CALL ACTIVE' : 'READY');
  };
  recog.onend = async () => {
    const t = S.finalTranscript.trim();
    if (!t) {
      setOrbActive(false);
      if (S.callMode && !S.pttActive) { vStatus('CALL ACTIVE'); setTimeout(startListen, 400); }
      else vStatus('READY');
      return;
    }
    vStatus('THINKING...'); setOrbActive(false); histAdd('user', t);
    let resp = '';
    await callAI(S.history,
      (chunk) => { resp += chunk; setVoiceResponse(resp); },
      () => {
        if (!resp) { vStatus(S.callMode ? 'CALL ACTIVE' : 'READY'); return; }
        histAdd('assistant', resp); vStatus('SPEAKING...'); setOrbActive(true);
        speak(resp, () => {
          setOrbActive(false);
          if (S.callMode || cfg().autoListen) { vStatus('CALL ACTIVE'); setTimeout(startListen, 300); }
          else vStatus('READY');
        });
      }
    );
  };
}

    const t1 = document.createElement('div'); t1.textContent = 'No briefs yet';
    const t2 = document.createElement('div'); t2.style.color = 'var(--g3)'; t2.style.fontSize = '12px'; t2.textContent = 'Briefs arrive at 6 AM CST';
    empty.appendChild(icon); empty.appendChild(t1); empty.appendChild(t2); list.appendChild(empty);
    return;
  }
  briefs.sort((a, b) => new Date(b.date) - new Date(a.date)).forEach(brief => {
    const item = document.createElement('div'); item.className = 'brief-item';
    const datePill = document.createElement('div'); datePill.className = 'brief-date';
    try { datePill.textContent = new Date(brief.date).toLocaleDateString('en-US', { month:'short', day:'numeric' }); } catch (_) { datePill.textContent = brief.date || ''; }
    const name = document.createElement('div'); name.className = 'brief-name'; name.textContent = brief.title || brief.filename || 'Brief';
    item.appendChild(datePill); item.appendChild(name);
    item.addEventListener('click', () => openBrief(brief));
    list.appendChild(item);
  });
}

async function openBrief(brief) {
  const viewer = document.getElementById('brief-viewer');
  document.getElementById('brief-viewer-title').textContent = brief.title || brief.filename || 'Brief';
  const content = document.getElementById('brief-content');
  content.textContent = 'Loading...';
  viewer.classList.remove('hidden');
  try {
    const c = cfg();
    const baseUrl = (BOTS[localStorage.getItem('hf_bot') || 'wray']?.url || c.url).replace(/\/v1.*$/, '');
    const res = await fetch(baseUrl + '/briefs/' + encodeURIComponent(brief.filename || ''), { headers:{ 'Authorization':'Bearer ' + c.token }, signal: AbortSignal.timeout(8000) });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const rawHtml = await res.text();
    // Parse and sanitize — remove scripts/iframes, import safe nodes only
    const parser = new DOMParser();
    const doc = parser.parseFromString(rawHtml, 'text/html');
    doc.querySelectorAll('script,style,iframe,object,embed,form,input,button').forEach(el => el.remove());
    doc.querySelectorAll('[onclick],[onerror],[onload]').forEach(el => {
      el.removeAttribute('onclick'); el.removeAttribute('onerror'); el.removeAttribute('onload');
    });
    doc.querySelectorAll('a').forEach(el => { el.setAttribute('target', '_blank'); el.setAttribute('rel', 'noopener noreferrer'); });
    content.textContent = '';
    Array.from((doc.body || doc.documentElement).childNodes).forEach(node => content.appendChild(document.importNode(node, true)));
  } catch (e) {
    content.textContent = 'Could not load brief: ' + e.message;
  }
}

document.getElementById('brief-back-btn').addEventListener('click', () => {
  document.getElementById('brief-viewer').classList.add('hidden');
  document.getElementById('brief-content').textContent = '';
});
document.getElementById('refresh-briefs-btn').addEventListener('click', () => { loadBriefs(); toast('Refreshing...'); });

// ─── VIDEO TAB ──────────────────────────────────
function loadVids() { try { S.videos = JSON.parse(localStorage.getItem('hf_videos') || '[]'); } catch (_) { S.videos = []; } }
function saveVids() { localStorage.setItem('hf_videos', JSON.stringify(S.videos.slice(-20))); }
function makePlayIcon() {
  const ns = 'http://www.w3.org/2000/svg';
  const svg = document.createElementNS(ns, 'svg'); svg.setAttribute('width','20'); svg.setAttribute('height','20'); svg.setAttribute('viewBox','0 0 24 24'); svg.setAttribute('fill','none'); svg.setAttribute('stroke','currentColor'); svg.setAttribute('stroke-width','1.5');
  const poly = document.createElementNS(ns, 'polygon'); poly.setAttribute('points','5 3 19 12 5 21 5 3');
  svg.appendChild(poly); return svg;
}
function renderVids() {
  const list = document.getElementById('video-list'); list.textContent = '';
  if (!S.videos.length) {
    const empty = document.createElement('div'); empty.className = 'video-empty';
    const icon = document.createElement('div'); icon.textContent = '🎬'; icon.style.fontSize = '32px';
    const txt = document.createElement('div'); txt.textContent = 'No videos yet';
    empty.appendChild(icon); empty.appendChild(txt); list.appendChild(empty); return;
  }
  S.videos.forEach(v => {
    const item = document.createElement('div'); item.className = 'video-item';
    const thumb = document.createElement('div'); thumb.className = 'video-thumb'; thumb.appendChild(makePlayIcon());
    const info = document.createElement('div'); info.className = 'video-info';
    const name = document.createElement('div'); name.className = 'video-name'; name.textContent = v.name;
    const meta = document.createElement('div'); meta.className = 'video-meta'; meta.textContent = v.type + ' · ' + new Date(v.added).toLocaleDateString();
    info.appendChild(name); info.appendChild(meta); item.appendChild(thumb); item.appendChild(info);
    item.addEventListener('click', () => { document.getElementById('video-player').src = v.url; document.getElementById('video-player').play().catch(() => {}); });
    list.appendChild(item);
  });
}
function addVid(name, url, type) { if (S.videos.length >= 20) S.videos.shift(); S.videos.push({ name, url, type, added: Date.now() }); saveVids(); renderVids(); }
document.getElementById('play-url-btn').addEventListener('click', () => {
  const inp = document.getElementById('video-url'), url = inp.value.trim(); if (!url) return;
  document.getElementById('video-player').src = url; document.getElementById('video-player').play().catch(() => {});
  addVid(url.split('/').pop().split('?')[0] || 'Video', url, 'URL'); inp.value = '';
});
document.getElementById('upload-video-btn').addEventListener('click', () => document.getElementById('video-file-input').click());
document.getElementById('video-file-input').addEventListener('change', (e) => {
  const file = e.target.files[0]; if (!file) return;
  const url = URL.createObjectURL(file);
  document.getElementById('video-player').src = url; document.getElementById('video-player').play().catch(() => {});
  addVid(file.name, url, 'File'); e.target.value = '';
});

// ─── TASKS TAB ──────────────────────────────────
function loadTasks() { try { S.tasks = JSON.parse(localStorage.getItem('hf_tasks') || '[]'); } catch (_) { S.tasks = []; } }
function saveTasks() { localStorage.setItem('hf_tasks', JSON.stringify(S.tasks)); }
function renderTasks() {
  const done = S.tasks.filter(t => t.done).length, total = S.tasks.length;
  document.getElementById('progress-bar').style.width = (total ? Math.round(done/total*100) : 0) + '%';
  document.getElementById('task-counter').textContent = done + '/' + total;
  const list = document.getElementById('task-list'); list.textContent = '';
  if (!total) {
    const empty = document.createElement('div'); empty.className = 'task-empty';
    const icon = document.createElement('div'); icon.textContent = '✓'; icon.style.fontSize = '28px';
    const txt = document.createElement('div'); txt.textContent = 'No tasks — add one above';
    empty.appendChild(icon); empty.appendChild(txt); list.appendChild(empty); return;
  }
  S.tasks.forEach((task, i) => {
    const item = document.createElement('div'); item.className = 'task-item';
    const cb = document.createElement('div'); cb.className = 'task-cb' + (task.done ? ' done' : '');
    const check = document.createElement('span'); check.className = 'task-check'; check.textContent = '✓'; cb.appendChild(check);
    cb.addEventListener('click', () => { S.tasks[i].done = !S.tasks[i].done; saveTasks(); renderTasks(); });
    const text = document.createElement('div'); text.className = 'task-text' + (task.done ? ' done' : ''); text.textContent = task.text;
    const del = document.createElement('button'); del.className = 'task-del'; del.textContent = '×'; del.setAttribute('aria-label','Delete');
    del.addEventListener('click', () => { S.tasks.splice(i,1); saveTasks(); renderTasks(); });
    item.appendChild(cb); item.appendChild(text); item.appendChild(del); list.appendChild(item);
  });
}
document.getElementById('add-task-btn').addEventListener('click', () => {
  const inp = document.getElementById('task-input'), t = inp.value.trim(); if (!t) return;
  S.tasks.push({ text:t, done:false }); saveTasks(); renderTasks(); inp.value = '';
});
document.getElementById('task-input').addEventListener('keydown', (e) => { if (e.key === 'Enter') document.getElementById('add-task-btn').click(); });
document.getElementById('clear-done-btn').addEventListener('click', () => { S.tasks = S.tasks.filter(t => !t.done); saveTasks(); renderTasks(); toast('Cleared'); });
document.getElementById('sync-tasks-btn').addEventListener('click', async () => {
  const btn = document.getElementById('sync-tasks-btn'); btn.disabled = true; btn.textContent = '⟳ Syncing...';
  let resp = '';
  await callAI([...S.history, { role:'user', content:'List my current tasks and job priorities as a numbered list. Tasks only, no commentary.' }],
    (chunk) => { resp += chunk; },
    () => {
      let added = 0;
      resp.split('\n').forEach(line => {
        const m = line.match(/^\s*\d+[\.\)]\s+(.+)/);
        if (m) { const text = m[1].trim(); if (text && !S.tasks.find(t => t.text.toLowerCase() === text.toLowerCase())) { S.tasks.push({ text, done:false }); added++; } }
      });
      saveTasks(); renderTasks(); toast(added + ' task' + (added !== 1 ? 's' : '') + ' synced');
      btn.textContent = '⟳ Sync from AI'; btn.disabled = false;
    }
  );
});

// ─── SETTINGS ───────────────────────────────────
function updateTtsVis() {
  const e = document.getElementById('set-tts-engine').value;
  document.getElementById('tts-key-field').style.display   = e !== 'browser' ? '' : 'none';
  document.getElementById('tts-voice-field').style.display = e === 'elevenlabs' ? '' : 'none';
}
function openSettings() {
  const c = cfg();
  document.getElementById('set-role').value         = c.role;
  document.getElementById('set-custom-prompt').value = localStorage.getItem('hf_custom_prompt') || '';
  document.getElementById('set-grok-key').value      = localStorage.getItem('hf_key_grok')    || '';
  document.getElementById('set-oai-key').value       = localStorage.getItem('hf_key_chatgpt') || '';
  document.getElementById('set-custom-url').value    = localStorage.getItem('hf_custom_url')   || '';
  document.getElementById('set-custom-token').value  = localStorage.getItem('hf_custom_token') || '';
  document.getElementById('set-custom-model').value  = localStorage.getItem('hf_custom_model') || '';
  document.getElementById('set-tts-engine').value    = c.ttsEngine;
  document.getElementById('set-tts-key').value       = c.ttsKey;
  document.getElementById('set-tts-voice').value     = c.ttsVoice;
  document.getElementById('toggle-voice').classList.toggle('on', c.voice);
  document.getElementById('toggle-auto').classList.toggle('on', c.autoListen);
  updateTtsVis();
  const bd = document.getElementById('settings-backdrop'), sh = document.getElementById('settings-sheet');
  bd.classList.remove('hidden'); sh.classList.remove('hidden');
  requestAnimationFrame(() => { bd.classList.add('visible'); sh.classList.add('visible'); });
}
function closeSettings() {
  document.getElementById('settings-backdrop').classList.remove('visible');
  document.getElementById('settings-sheet').classList.remove('visible');
  setTimeout(() => { document.getElementById('settings-backdrop').classList.add('hidden'); document.getElementById('settings-sheet').classList.add('hidden'); }, 320);
}
document.getElementById('settings-btn').addEventListener('click', openSettings);
document.getElementById('settings-backdrop').addEventListener('click', closeSettings);
document.getElementById('set-tts-engine').addEventListener('change', updateTtsVis);
['toggle-voice','toggle-auto'].forEach(id => {
  const el = document.getElementById(id);
  el.addEventListener('click', () => { el.classList.toggle('on'); el.setAttribute('aria-checked', String(el.classList.contains('on'))); });
});
document.getElementById('save-settings-btn').addEventListener('click', () => {
  localStorage.setItem('wray_role',           document.getElementById('set-role').value);
  localStorage.setItem('hf_custom_prompt',    document.getElementById('set-custom-prompt').value);
  localStorage.setItem('hf_key_grok',         document.getElementById('set-grok-key').value.trim());
  localStorage.setItem('hf_key_chatgpt',      document.getElementById('set-oai-key').value.trim());
  localStorage.setItem('hf_custom_url',       document.getElementById('set-custom-url').value.trim());
  localStorage.setItem('hf_custom_token',     document.getElementById('set-custom-token').value.trim());
  localStorage.setItem('hf_custom_model',     document.getElementById('set-custom-model').value.trim());
  localStorage.setItem('hf_tts_engine',       document.getElementById('set-tts-engine').value);
  localStorage.setItem('hf_tts_key',          document.getElementById('set-tts-key').value.trim());
  localStorage.setItem('hf_tts_voice',        document.getElementById('set-tts-voice').value.trim() || 'pNInz6obpgDQGcFmaJgB');
  localStorage.setItem('wray_voice',          String(document.getElementById('toggle-voice').classList.contains('on')));
  localStorage.setItem('wray_autoListen',     String(document.getElementById('toggle-auto').classList.contains('on')));
  closeSettings(); toast('Settings saved');
});
document.getElementById('test-conn-btn').addEventListener('click', async () => {
  const btn = document.getElementById('test-conn-btn'); btn.textContent = 'Testing...';
  const c = cfg();
  const baseUrl = c.url.replace(/\/v1.*$/, '');
  try {
    const r = await fetch(baseUrl + '/health', { headers:{ 'Authorization':'Bearer ' + c.token }, signal: AbortSignal.timeout(5000) });
    if (r.ok) { setDot('ok'); toast('✓ Connected'); }
    else throw new Error('HTTP ' + r.status);
  } catch (_) {
    let got = false;
    await callAI([{ role:'user', content:'ping' }], () => { got = true; }, () => {});
    if (got) { setDot('ok'); toast('✓ AI responded'); }
    else { setDot('err'); toast('✗ Cannot reach endpoint'); }
  }
  btn.textContent = 'Test Connection';
});

// ─── TAB NAV ────────────────────────────────────
function switchTab(name) {
  if (S.tab === name) return;
  if (S.tab === 'camera') stopCam();
  S.tab = name;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === name));
  if (name === 'camera') startCam();
  if (name === 'briefs') loadBriefs();
}
document.querySelectorAll('.nav-btn').forEach(btn => btn.addEventListener('click', () => switchTab(btn.dataset.tab)));

loadTasks(); loadVids(); renderTasks(); renderVids();

  e.preventDefault();
}, { passive:false });
(async () => {
  const c = cfg();
  try { const r = await fetch(c.url.replace(/\/v1.*$/,'') + '/health', { headers:{ 'Authorization':'Bearer '+c.token }, signal: AbortSignal.timeout(4000) }); setDot(r.ok ? 'ok' : 'err'); }
  catch (_) { setDot('err'); }
})();
</script>
